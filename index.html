<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel Murilo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --card:#16161c;
  --card2:#1c1c24;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#eeeae0;
  --muted:#5a5860;
  --muted2:#3a3840;
  --lime:#c6f135;
  --blue:#4db8ff;
  --orange:#ff9f45;
  --purple:#b794f4;
  --red:#ff6b6b;
  --green:#4ade80;
  --sans:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;padding-bottom:80px}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.logo{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--muted)}
.logo b{color:var(--lime)}
.topbar-date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:10}
.nav-btn{flex:1;padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.05em;border:none;background:none;transition:color .15s}
.nav-btn .nav-icon{font-size:18px}
.nav-btn.active{color:var(--lime)}

/* PAGES */
.page{display:none;padding:20px}
.page.active{display:block}

/* SECTION TITLE */
.sec-title{font-size:11px;font-family:var(--mono);letter-spacing:.1em;color:var(--muted);margin-bottom:14px;text-transform:uppercase}

/* CHECKLIST */
.day-header{margin-bottom:20px}
.day-title{font-size:22px;font-weight:700;margin-bottom:2px}
.day-sub{font-size:13px;color:var(--muted)}
.day-progress{display:flex;align-items:center;gap:10px;margin-top:12px}
.day-bar-wrap{flex:1;height:4px;background:var(--muted2);border-radius:2px}
.day-bar{height:4px;background:var(--lime);border-radius:2px;transition:width .3s}
.day-pct{font-family:var(--mono);font-size:11px;color:var(--muted)}

.task-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;transition:all .15s}
.task-item.done{opacity:.5}
.task-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.task-item.done .task-check{background:var(--lime);border-color:var(--lime)}
.task-check-icon{font-size:11px;color:#000;font-weight:700;display:none}
.task-item.done .task-check-icon{display:block}
.task-body{flex:1;min-width:0}
.task-text{font-size:14px;font-weight:500;line-height:1.4}
.task-item.done .task-text{text-decoration:line-through}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.empresa-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;font-weight:600}
.badge-ouvix{background:rgba(77,184,255,.15);color:var(--blue)}
.badge-jm{background:rgba(183,148,244,.15);color:var(--purple)}
.badge-mr{background:rgba(198,241,53,.15);color:var(--lime)}
.qty-badge{font-size:10px;font-family:var(--mono);color:var(--muted);padding:2px 6px;background:var(--card2);border-radius:4px}
.task-del{margin-left:auto;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:16px;padding:0 2px;transition:color .15s;flex-shrink:0}
.task-del:hover{color:var(--red)}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px}

/* ADD TASK BTN */
.add-task-btn{width:100%;padding:13px;background:var(--card);border:1px dashed var(--border2);border-radius:10px;color:var(--muted);font-family:var(--sans);font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.add-task-btn:hover{border-color:var(--lime);color:var(--lime)}

/* EMPRESA TABS */
.emp-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px}
.emp-tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.emp-tab.active{background:var(--lime);color:#000;border-color:var(--lime)}

/* EMPRESA CARD */
.emp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.emp-card-title{font-size:16px;font-weight:700;margin-bottom:4px}
.emp-card-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.meta-label{font-size:13px;color:var(--muted)}
.meta-vals{font-family:var(--mono);font-size:13px}
.meta-cur{color:var(--text);font-weight:700}
.meta-total{color:var(--muted)}
.meta-bar-wrap{height:6px;background:var(--muted2);border-radius:3px;margin-bottom:18px}
.meta-bar{height:6px;border-radius:3px;transition:width .4s}
.meta-pct{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;margin-top:4px;margin-bottom:18px}

.emp-history{margin-top:4px}
.hist-title{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;margin-bottom:10px}
.hist-day{padding:10px 12px;background:var(--card2);border-radius:8px;margin-bottom:6px}
.hist-day-date{font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:6px}
.hist-task{font-size:12px;color:var(--text);padding:2px 0;display:flex;align-items:center;gap:6px}
.hist-task.done-hist::before{content:'✓';color:var(--lime);font-size:10px;font-weight:700}
.hist-task.pend-hist::before{content:'○';color:var(--muted);font-size:10px}

/* HISTÓRICO PAGE */
.hist-item{padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.hist-item-date{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:8px}
.hist-item-tasks{display:flex;flex-direction:column;gap:4px}
.hist-line{font-size:13px;display:flex;align-items:center;gap:8px}
.hist-line.done-line{color:var(--text)}
.hist-line.pend-line{color:var(--muted)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:600px;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:6px;display:block;letter-spacing:.06em}
.form-input{width:100%;padding:11px 14px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--lime)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empresa-select{display:flex;gap:8px;flex-wrap:wrap}
.emp-sel-btn{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border2);background:none;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.emp-sel-btn.sel-ouvix.active{background:rgba(77,184,255,.2);border-color:var(--blue);color:var(--blue)}
.emp-sel-btn.sel-jm.active{background:rgba(183,148,244,.2);border-color:var(--purple);color:var(--purple)}
.emp-sel-btn.sel-mr.active{background:rgba(198,241,53,.2);border-color:var(--lime);color:var(--lime)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;padding:13px;background:var(--lime);color:#000;border:none;border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-secondary{padding:13px 20px;background:var(--card2);color:var(--text);border:1px solid var(--border2);border-radius:10px;font-family:var(--sans);font-size:14px;cursor:pointer}

/* METAS MODAL */
.metas-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.metas-modal{background:var(--card);border-radius:16px;padding:28px 24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.metas-month{font-family:var(--mono);font-size:11px;color:var(--lime);margin-bottom:6px;letter-spacing:.08em}
.metas-title{font-size:20px;font-weight:700;margin-bottom:4px}
.metas-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.metas-emp-section{margin-bottom:24px}
.metas-emp-name{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.metas-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.metas-row label{font-size:13px;color:var(--muted);flex:1}
.metas-row input{width:130px;padding:8px 10px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s}
.metas-row input:focus{border-color:var(--lime)}
.metas-row .metas-unit{font-size:11px;color:var(--muted);font-family:var(--mono);width:60px}
.mr-field-row{display:grid;grid-template-columns:1fr 100px 60px;gap:8px;margin-bottom:8px}
.mr-field-row input{width:100%;padding:8px 10px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
.mr-field-row input:focus{border-color:var(--lime)}
.mr-field-row input::placeholder{color:var(--muted)}
.add-mr-field{background:none;border:1px dashed var(--border2);border-radius:8px;color:var(--muted);font-size:12px;padding:7px 12px;cursor:pointer;width:100%;margin-top:4px;font-family:var(--sans)}
.add-mr-field:hover{border-color:var(--lime);color:var(--lime)}

/* PROGRESS TRACKER */
.prog-block{background:var(--card2);border-radius:10px;padding:14px;margin-bottom:12px}
.prog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-label{font-size:13px;font-weight:600}
.prog-nums{font-family:var(--mono);font-size:13px}
.prog-cur{font-size:20px;font-weight:700}
.prog-total{color:var(--muted);font-size:13px}
.prog-bar-wrap{height:6px;background:var(--muted2);border-radius:3px;margin-bottom:10px}
.prog-bar{height:6px;border-radius:3px;transition:width .4s}
.prog-controls{display:flex;align-items:center;gap:8px}
.prog-input{width:80px;padding:7px 10px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;text-align:center}
.prog-input:focus{border-color:var(--lime)}
.prog-add-btn{padding:7px 14px;background:var(--lime);color:#000;border:none;border-radius:7px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer}
.prog-sub-btn{padding:7px 10px;background:var(--card);border:1px solid var(--border2);color:var(--muted);border-radius:7px;font-size:12px;cursor:pointer}
.prog-pct{font-family:var(--mono);font-size:10px;color:var(--muted)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><b>MR</b> PAINEL</div>
  <div class="topbar-date" id="topbar-date"></div>
</div>

<!-- PAGE: HOJE -->
<div class="page active" id="page-hoje">
  <div class="day-header">
    <div class="day-title" id="day-title"></div>
    <div class="day-sub" id="day-sub"></div>
    <div class="day-progress">
      <div class="day-bar-wrap"><div class="day-bar" id="day-bar" style="width:0%"></div></div>
      <div class="day-pct" id="day-pct">0%</div>
    </div>
  </div>

  <div class="task-list" id="task-list"></div>

  <button class="add-task-btn" onclick="openTaskModal()">
    <span>+</span> Adicionar tarefa
  </button>
</div>

<!-- PAGE: EMPRESAS -->
<div class="page" id="page-empresas">
  <div class="emp-tabs">
    <button class="emp-tab active" onclick="switchEmp('ouvix',this)">Ouvix Pro</button>
    <button class="emp-tab" onclick="switchEmp('jm',this)">JM Infoprodutos</button>
    <button class="emp-tab" onclick="switchEmp('mr',this)">MR Digital</button>
  </div>
  <div id="emp-content"></div>
</div>

<!-- PAGE: HISTÓRICO -->
<div class="page" id="page-hist">
  <div class="sec-title">Histórico geral</div>
  <div id="hist-content"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-hoje" onclick="switchPage('hoje')">
    <span class="nav-icon">☑️</span>Hoje
  </button>
  <button class="nav-btn" id="nav-empresas" onclick="switchPage('empresas')">
    <span class="nav-icon">🏢</span>Empresas
  </button>
  <button class="nav-btn" id="nav-hist" onclick="switchPage('hist')">
    <span class="nav-icon">📋</span>Histórico
  </button>
</div>

<!-- MODAL: NOVA TAREFA -->
<div class="modal-overlay" id="task-modal-overlay">
  <div class="modal">
    <div class="modal-title">Nova tarefa</div>
    <div class="modal-sub">O que você vai fazer?</div>

    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-input" id="task-texto" placeholder="ex: Ligar para leads do Facebook" />
    </div>

    <div class="form-group">
      <label class="form-label">Empresa</label>
      <div class="empresa-select">
        <button class="emp-sel-btn sel-ouvix" onclick="selEmp('ouvix')">Ouvix Pro</button>
        <button class="emp-sel-btn sel-jm" onclick="selEmp('jm')">JM Infoprodutos</button>
        <button class="emp-sel-btn sel-mr" onclick="selEmp('mr')">MR Digital</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Quantidade (opcional)</label>
        <input class="form-input" id="task-qty" type="number" placeholder="ex: 10" min="0"/>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Unidade</label>
        <input class="form-input" id="task-unit" placeholder="ex: reuniões"/>
      </div>
    </div>

    <div class="form-group" style="margin-top:14px">
      <label class="form-label">Agendar para outro dia? (opcional)</label>
      <input class="form-input" id="task-date" type="date"/>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeTaskModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: METAS DO MÊS -->
<div class="metas-modal-overlay" id="metas-modal" style="display:none">
  <div class="metas-modal">
    <div class="metas-month" id="metas-month-label"></div>
    <div class="metas-title">Metas do mês</div>
    <div class="metas-sub">Defina suas metas para cada empresa este mês.</div>

    <!-- Ouvix -->
    <div class="metas-emp-section">
      <div class="metas-emp-name">🔵 Ouvix Pro</div>
      <div class="metas-row">
        <label>Clientes fechados</label>
        <input type="number" id="m-ouvix-clientes" placeholder="ex: 80" min="0"/>
        <span class="metas-unit">clientes</span>
      </div>
      <div class="metas-row">
        <label>Reuniões</label>
        <input type="number" id="m-ouvix-reunioes" placeholder="ex: 40" min="0"/>
        <span class="metas-unit">reuniões</span>
      </div>
    </div>

    <!-- JM -->
    <div class="metas-emp-section">
      <div class="metas-emp-name">🟣 JM Infoprodutos</div>
      <div class="metas-row">
        <label>Lucro</label>
        <input type="number" id="m-jm-lucro" placeholder="ex: 10000" min="0"/>
        <span class="metas-unit">R$</span>
      </div>
      <div class="metas-row">
        <label>Produtos testados</label>
        <input type="number" id="m-jm-produtos" placeholder="ex: 6" min="0"/>
        <span class="metas-unit">produtos</span>
      </div>
    </div>

    <!-- MR Digital -->
    <div class="metas-emp-section">
      <div class="metas-emp-name">🟢 MR Digital</div>
      <div class="metas-sub" style="font-size:12px;margin-bottom:10px">Defina os campos que quiser acompanhar</div>
      <div id="mr-fields"></div>
      <button class="add-mr-field" onclick="addMrField()">+ Adicionar campo</button>
    </div>

    <button class="btn-primary" onclick="saveMetas()" style="width:100%;margin-top:8px">Salvar metas</button>
  </div>
</div>

<script>
// ── UTILS ──────────────────────────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0,10);
const MONTH = TODAY.slice(0,7);

function fmt(date){
  const [y,m,d] = date.split('-');
  const names = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const dow = new Date(y, m-1, d).getDay();
  return `${names[dow]}, ${parseInt(d)} ${months[m-1]}`;
}

function todayKey(){ return TODAY; }

// ── STORAGE + SYNC (JSONBin — funciona em qualquer dispositivo) ────────────
const JSONBIN_KEY = '$2a$10$HEIJnLK4eMRxm7LvzeIeJ.LrdB5.Wp0M/0GFaXD6h75OmVjg8CDLa';
const JSONBIN_BIN = '69dd5ad5aaba882197f6473b';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`;

async function syncFromServer() {
  try {
    const r = await fetch(`${JSONBIN_URL}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY },
      signal: AbortSignal.timeout(5000)
    });
    if (!r.ok) return;
    const json = await r.json();
    const remote = json.record || {};

    const local = loadData();
    const localTasks = Object.keys(local.tasks || {}).length;
    const remoteTasks = Object.keys(remote.tasks || {}).length;

    if (remoteTasks > localTasks) {
      // Nuvem tem mais dados → puxa para cá
      localStorage.setItem('painel_murilo_v3', JSON.stringify(remote));
    } else if (localTasks > remoteTasks) {
      // Local tem mais dados → empurra para nuvem
      saveToServer(local);
    }
    // Se igual, não faz nada
  } catch {}
}

async function saveToServer(d) {
  try {
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify(d),
      signal: AbortSignal.timeout(5000)
    });
  } catch {}
}

function loadData(){
  try{ return JSON.parse(localStorage.getItem('painel_murilo_v3') || '{}'); }
  catch{ return {}; }
}
function saveData(d){
  localStorage.setItem('painel_murilo_v3', JSON.stringify(d));
  saveToServer(d); // sincroniza em background com JSONBin
}

function getTasks(date){
  const d = loadData();
  return (d.tasks && d.tasks[date]) ? d.tasks[date] : [];
}
function setTasks(date, tasks){
  const d = loadData();
  if(!d.tasks) d.tasks = {};
  d.tasks[date] = tasks;
  saveData(d);
}
function getMetas(){
  const d = loadData();
  return (d.metas && d.metas[MONTH]) ? d.metas[MONTH] : null;
}
function saveMetas_(){
  const ouvix = {
    clientes: parseFloat(document.getElementById('m-ouvix-clientes').value)||0,
    reunioes: parseFloat(document.getElementById('m-ouvix-reunioes').value)||0
  };
  const jm = {
    lucro: parseFloat(document.getElementById('m-jm-lucro').value)||0,
    produtos: parseFloat(document.getElementById('m-jm-produtos').value)||0
  };
  // MR fields
  const mrFieldEls = document.querySelectorAll('.mr-field-entry');
  const mrFields = [];
  mrFieldEls.forEach(el => {
    const label = el.querySelector('.mrf-label').value.trim();
    const meta = parseFloat(el.querySelector('.mrf-meta').value)||0;
    const unit = el.querySelector('.mrf-unit').value.trim();
    if(label) mrFields.push({label, meta, unit});
  });

  const d = loadData();
  if(!d.metas) d.metas = {};
  d.metas[MONTH] = { ouvix, jm, mr: mrFields };
  d.metasSetup = MONTH;
  saveData(d);

  document.getElementById('metas-modal').style.display='none';
  renderHoje();
  renderEmpresas();
}

// ── METAS MODAL ────────────────────────────────────────────────────────────
let mrFieldCount = 0;
function openMetasModal(){
  document.getElementById('metas-month-label').textContent = MONTH.replace('-', '/');
  // pre-fill existing
  const m = getMetas();
  if(m){
    document.getElementById('m-ouvix-clientes').value = m.ouvix?.clientes||'';
    document.getElementById('m-ouvix-reunioes').value = m.ouvix?.reunioes||'';
    document.getElementById('m-jm-lucro').value = m.jm?.lucro||'';
    document.getElementById('m-jm-produtos').value = m.jm?.produtos||'';
    const mrEl = document.getElementById('mr-fields');
    mrEl.innerHTML = '';
    mrFieldCount = 0;
    (m.mr||[]).forEach(f => addMrField(f.label, f.meta, f.unit));
  } else {
    document.getElementById('mr-fields').innerHTML = '';
    mrFieldCount = 0;
  }
  document.getElementById('metas-modal').style.display='flex';
}
function addMrField(label='', meta='', unit=''){
  const id = mrFieldCount++;
  const el = document.createElement('div');
  el.className = 'mr-field-row mr-field-entry';
  el.innerHTML = `
    <input class="mrf-label" placeholder="Nome do campo" value="${label}"/>
    <input class="mrf-meta" type="number" placeholder="Meta" value="${meta||''}"/>
    <input class="mrf-unit" placeholder="un." value="${unit}"/>
  `;
  document.getElementById('mr-fields').appendChild(el);
}
function saveMetas(){ saveMetas_(); }

// ── PROGRESSO ─────────────────────────────────────────────────────────────
function getProgresso(emp){
  const d = loadData();
  return (d.progresso && d.progresso[MONTH] && d.progresso[MONTH][emp]) ? d.progresso[MONTH][emp] : {};
}
function addProgresso(emp, key, delta){
  const d = loadData();
  if(!d.progresso) d.progresso = {};
  if(!d.progresso[MONTH]) d.progresso[MONTH] = {};
  if(!d.progresso[MONTH][emp]) d.progresso[MONTH][emp] = {};
  const cur = parseFloat(d.progresso[MONTH][emp][key]) || 0;
  d.progresso[MONTH][emp][key] = Math.max(0, cur + delta);
  saveData(d);
  renderEmpresas();
}
function addProgressoFromInput(emp, key, inputId){
  const v = parseFloat(document.getElementById(inputId).value) || 0;
  if(!v) return;
  addProgresso(emp, key, v);
  document.getElementById(inputId).value = '';
}

// check if metas needed
function checkMetas(){
  const d = loadData();
  if(d.metasSetup !== MONTH){
    openMetasModal();
  }
}

// ── TASK MODAL ────────────────────────────────────────────────────────────
let selectedEmp = null;
function openTaskModal(){
  selectedEmp = null;
  document.getElementById('task-texto').value = '';
  document.getElementById('task-qty').value = '';
  document.getElementById('task-unit').value = '';
  document.getElementById('task-date').value = TODAY;
  document.querySelectorAll('.emp-sel-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('task-modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('task-texto').focus(), 300);
}
function closeTaskModal(){
  document.getElementById('task-modal-overlay').classList.remove('open');
}
function selEmp(emp){
  selectedEmp = emp;
  document.querySelectorAll('.emp-sel-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sel-${emp}`).classList.add('active');
}
function saveTask(){
  const texto = document.getElementById('task-texto').value.trim();
  if(!texto){ alert('Escreva a descrição da tarefa'); return; }
  if(!selectedEmp){ alert('Selecione a empresa'); return; }
  const qty = document.getElementById('task-qty').value;
  const unit = document.getElementById('task-unit').value.trim();
  const date = document.getElementById('task-date').value || TODAY;

  const tasks = getTasks(date);
  tasks.push({
    id: 'task_' + Date.now(),
    texto,
    empresa: selectedEmp,
    qty: qty ? parseFloat(qty) : null,
    unit: unit || null,
    done: false,
    agendada: date !== TODAY
  });
  setTasks(date, tasks);
  closeTaskModal();
  renderHoje();
}

// ── HOJE ──────────────────────────────────────────────────────────────────
function toggleTask(id){
  const tasks = getTasks(TODAY);
  const t = tasks.find(t=>t.id===id);
  if(t) t.done = !t.done;
  setTasks(TODAY, tasks);
  renderHoje();
}
function deleteTask(id){
  const tasks = getTasks(TODAY).filter(t=>t.id!==id);
  setTasks(TODAY, tasks);
  renderHoje();
}

const EMP_LABELS = { ouvix:'Ouvix Pro', jm:'JM Infoprodutos', mr:'MR Digital' };
const EMP_BADGE = { ouvix:'badge-ouvix', jm:'badge-jm', mr:'badge-mr' };

function renderHoje(){
  const tasks = getTasks(TODAY);
  const done = tasks.filter(t=>t.done).length;
  const total = tasks.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById('day-title').textContent = fmt(TODAY);
  document.getElementById('day-sub').textContent = total
    ? `${done} de ${total} tarefas concluídas`
    : 'Nenhuma tarefa ainda — adicione o que vai fazer hoje';
  document.getElementById('day-bar').style.width = pct + '%';
  document.getElementById('day-pct').textContent = pct + '%';

  const el = document.getElementById('task-list');
  if(!tasks.length){
    el.innerHTML = '';
    return;
  }
  el.innerHTML = tasks.map(t => `
    <div class="task-item ${t.done?'done':''}" id="ti-${t.id}">
      <div class="task-check" onclick="toggleTask('${t.id}')">
        <span class="task-check-icon">✓</span>
      </div>
      <div class="task-body">
        <div class="task-text">${t.texto}</div>
        <div class="task-meta">
          <span class="empresa-badge ${EMP_BADGE[t.empresa]}">${EMP_LABELS[t.empresa]}</span>
          ${t.qty!=null ? `<span class="qty-badge">${t.qty}${t.unit?' '+t.unit:''}</span>` : ''}
        </div>
      </div>
      <button class="task-del" onclick="deleteTask('${t.id}')">×</button>
    </div>
  `).join('');
}

// ── EMPRESAS ──────────────────────────────────────────────────────────────
let currentEmp = 'ouvix';
function switchEmp(emp, btn){
  currentEmp = emp;
  document.querySelectorAll('.emp-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderEmpresas();
}

function getEmpTasks(emp){
  const d = loadData();
  const all = [];
  if(!d.tasks) return all;
  Object.entries(d.tasks).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date, tasks])=>{
    const emp_tasks = tasks.filter(t=>t.empresa===emp);
    if(emp_tasks.length) all.push({date, tasks: emp_tasks});
  });
  return all;
}

function metaBar(cur, meta, color){
  const pct = meta ? Math.min(100, Math.round((cur/meta)*100)) : 0;
  return `
    <div class="meta-row">
      <span class="meta-label" style="display:none"></span>
      <div style="flex:1">
        <div class="meta-bar-wrap"><div class="meta-bar" style="width:${pct}%;background:${color}"></div></div>
      </div>
    </div>
    <div class="meta-pct">${pct}%</div>
  `;
}

function sumQty(tasks, emp, key){
  // sum qty of tasks for this emp where unit contains key (approximate)
  return tasks.flatMap(d=>d.tasks)
    .filter(t=>t.done && t.qty!=null)
    .reduce((s,t)=>s+t.qty, 0);
}

function renderEmpresas(){
  const m = getMetas();
  const empTasks = getEmpTasks(currentEmp);
  const allTasks = empTasks.flatMap(d=>d.tasks);
  const doneTasks = allTasks.filter(t=>t.done);

  let html = '';

  function progBlock(label, key, emp, meta, color, prefix='', suffix=''){
    const prog = getProgresso(emp);
    const cur = prog[key] || 0;
    const pct = meta ? Math.min(100, Math.round((cur/meta)*100)) : 0;
    const inputId = `pi-${emp}-${key}`;
    return `
      <div class="prog-block">
        <div class="prog-header">
          <span class="prog-label">${label}</span>
          <span class="prog-nums">
            <span class="prog-cur">${prefix}${cur.toLocaleString('pt-BR')}${suffix}</span>
            <span class="prog-total"> / ${prefix}${(meta||0).toLocaleString('pt-BR')}${suffix}</span>
          </span>
        </div>
        <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%;background:${color}"></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="prog-controls">
            <button class="prog-sub-btn" onclick="addProgresso('${emp}','${key}',-1)">−1</button>
            <input class="prog-input" id="${inputId}" type="number" placeholder="+valor" min="0"/>
            <button class="prog-add-btn" onclick="addProgressoFromInput('${emp}','${key}','${inputId}')">+ Adicionar</button>
          </div>
          <span class="prog-pct">${pct}%</span>
        </div>
      </div>
    `;
  }

  if(currentEmp === 'ouvix'){
    const ouvix = m?.ouvix || {};
    const taskCount = empTasks.filter(d=>d.date.startsWith(MONTH)).flatMap(d=>d.tasks.filter(t=>t.done)).length;
    html = `
      <div class="emp-card">
        <div class="emp-card-title">🔵 Ouvix Pro</div>
        <div class="emp-card-sub">${MONTH.replace('-','/')} · ${taskCount} tarefas concluídas este mês</div>
        ${progBlock('Clientes fechados','clientes','ouvix',ouvix.clientes,'var(--blue)')}
        ${progBlock('Reuniões','reunioes','ouvix',ouvix.reunioes,'var(--blue)')}
        <button class="btn-secondary" onclick="openMetasModal()" style="font-size:12px;padding:8px 14px;margin-top:4px">Editar metas</button>
      </div>
    `;
  } else if(currentEmp === 'jm'){
    const jm = m?.jm || {};
    const taskCount = empTasks.filter(d=>d.date.startsWith(MONTH)).flatMap(d=>d.tasks.filter(t=>t.done)).length;
    html = `
      <div class="emp-card">
        <div class="emp-card-title">🟣 JM Infoprodutos</div>
        <div class="emp-card-sub">${MONTH.replace('-','/')} · ${taskCount} tarefas concluídas este mês</div>
        ${progBlock('Lucro','lucro','jm',jm.lucro,'var(--purple)','R$ ')}
        ${progBlock('Produtos testados','produtos','jm',jm.produtos,'var(--purple)')}
        <button class="btn-secondary" onclick="openMetasModal()" style="font-size:12px;padding:8px 14px;margin-top:4px">Editar metas</button>
      </div>
    `;
  } else if(currentEmp === 'mr'){
    const mr = m?.mr || [];
    const taskCount = empTasks.filter(d=>d.date.startsWith(MONTH)).flatMap(d=>d.tasks.filter(t=>t.done)).length;
    const mrBlocks = mr.length
      ? mr.map((f,i)=>progBlock(f.label, 'campo'+i, 'mr', f.meta, 'var(--lime)', '', f.unit?' '+f.unit:'')).join('')
      : `<div style="color:var(--muted);font-size:13px;margin-bottom:16px">Nenhuma meta definida ainda.</div>`;
    html = `
      <div class="emp-card">
        <div class="emp-card-title">🟢 MR Digital</div>
        <div class="emp-card-sub">${MONTH.replace('-','/')} · ${taskCount} tarefas concluídas este mês</div>
        ${mrBlocks}
        <button class="btn-secondary" onclick="openMetasModal()" style="font-size:12px;padding:8px 14px;margin-top:4px">Editar metas</button>
      </div>
    `;
  }

  // History for this empresa
  if(empTasks.length){
    html += `<div class="emp-history">
      <div class="hist-title">HISTÓRICO</div>
      ${empTasks.slice(0,20).map(d=>`
        <div class="hist-day">
          <div class="hist-day-date">${fmt(d.date)}</div>
          ${d.tasks.map(t=>`
            <div class="hist-task ${t.done?'done-hist':'pend-hist'}">
              ${t.texto}${t.qty!=null?` <span style="color:var(--muted);font-size:11px">${t.qty}${t.unit?' '+t.unit:''}</span>`:''}
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>`;
  }

  document.getElementById('emp-content').innerHTML = html;
}

// ── HISTÓRICO GERAL ───────────────────────────────────────────────────────
function renderHist(){
  const d = loadData();
  if(!d.tasks || !Object.keys(d.tasks).length){
    document.getElementById('hist-content').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhum registro ainda</div></div>';
    return;
  }
  const sorted = Object.entries(d.tasks).sort((a,b)=>b[0].localeCompare(a[0]));
  document.getElementById('hist-content').innerHTML = sorted.map(([date, tasks])=>`
    <div class="hist-item">
      <div class="hist-item-date">${fmt(date)}${date===TODAY?' · Hoje':''}</div>
      <div class="hist-item-tasks">
        ${tasks.map(t=>`
          <div class="hist-line ${t.done?'done-line':'pend-line'}">
            <span>${t.done?'✓':'○'}</span>
            <span class="empresa-badge ${EMP_BADGE[t.empresa]}" style="font-size:9px">${EMP_LABELS[t.empresa]}</span>
            <span>${t.texto}${t.qty!=null?` — ${t.qty}${t.unit?' '+t.unit:''}`:''}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ── NAV ───────────────────────────────────────────────────────────────────
function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  if(page==='empresas') renderEmpresas();
  if(page==='hist') renderHist();
}

// ── CLOSE MODAL ON BG CLICK ───────────────────────────────────────────────
document.getElementById('task-modal-overlay').addEventListener('click', function(e){
  if(e.target === this) closeTaskModal();
});

// ── TOPBAR DATE ───────────────────────────────────────────────────────────
(function(){
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const now = new Date();
  document.getElementById('topbar-date').textContent =
    `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
})();

// ── INIT ──────────────────────────────────────────────────────────────────
// Sincroniza do servidor antes de renderizar (puxa dados mais recentes)
syncFromServer().then(() => renderHoje());
</script>
