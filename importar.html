<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Importar dados</title>
<style>
body{font-family:sans-serif;background:#0f0f13;color:#eee;padding:40px;max-width:600px;margin:0 auto}
h2{margin-bottom:8px}
p{color:#888;margin-bottom:20px;font-size:14px}
textarea{width:100%;height:200px;background:#1c1c24;border:1px solid #333;color:#eee;padding:12px;border-radius:8px;font-size:13px;font-family:monospace}
button{margin-top:12px;padding:12px 24px;background:#c6f135;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
#msg{margin-top:12px;font-size:14px}
</style>
</head>
<body>
<h2>Importar dados do painel</h2>
<p>Cole o JSON abaixo e clique em Importar. Depois acesse o painel normalmente.</p>
<textarea id="json" placeholder='Cole o JSON aqui...'></textarea>
<button onclick="importar()">Importar e ir para o painel</button>
<div id="msg"></div>
<script>
function importar(){
  try{
    var v = document.getElementById('json').value.trim().replace(/[\r\n]+/g, ' ');
    JSON.parse(v); // valida
    localStorage.setItem('painel_murilo_v3', v);
    document.getElementById('msg').innerHTML = '<span style="color:#c6f135">✓ Importado! Redirecionando...</span>';
    setTimeout(()=>{ window.location.href='index.html'; }, 1200);
  }catch(e){
    document.getElementById('msg').innerHTML = '<span style="color:#ff6b6b">Erro: JSON inválido. Verifique o conteúdo.</span>';
  }
}
</script>
</body>
</html>
